{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cercetador!</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <style>
        html, body, #map {
            margin: 0;
            height: 100%;
            width: 100%;
        }

        #rules {
            font-weight: bold;
            font-size: 1em;
            padding: 10px;
            border-radius: 10px;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 400;
        }

        #challenge {
            font-weight: bold;
            font-size: 1em;
            padding: 10px;
            border-radius: 10px;
            position: absolute;
            bottom: 20px;
            right: 10px;
            z-index: 400;
        }

        #scores {
            padding: 10px;
            font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
            position: absolute;
            right: 10px;
            top: 60px;
            z-index: 400;
        }

        #scores ol li {
            padding: 2px;
            font-size: 1em;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div id = "map"></div>
    <div><button id="rules" href = "{% url 'rules' %}">Reguli</button></div>
    <div data-team-group="{{ team_group }}" id = "team-group"></div>
    <div id = "scores">Scores</div>
    <div><button id="challenge">Turnuri în apropiere!</button></div>
<script src="{% static 'js/map_control_score.js' %}"></script>
</body>
</html>
